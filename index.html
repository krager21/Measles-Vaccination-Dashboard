body { font-family: 'DM Sans', system-ui, sans-serif; background: #F8FAFC; min-height: 100vh; padding: 24px 20px; }

h1 { font-size: 26px; font-weight: 800; color: #0F172A; }

.filters input { flex: 1 1 220px; min-width: 200px; }
.stats { display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 24px; }

.stat-label { font-size: 12px; font-weight: 600; color: #64748B; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
.stat-value { font-size: 28px; font-weight: 800; color: #0F172A; }
.stat-sub { font-size: 12px; color: #94A3B8; margin-top: 2px; }
.tabs { display: flex; gap: 4px; margin-bottom: 16px; background: #E2E8F0; border-radius: 10px; padding: 3px; width: fit-content; }

table { width: 100%; border-collapse: collapse; font-size: 13px; }

.bar-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
.bar-label { width: 100px; font-size: 12px; color: #475569; text-align: right; flex-shrink: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

.bar-fill { height: 100%; border-radius: 6px; transition: width 0.4s ease; }
.bar-val { position: absolute; right: 8px; top: 2px; font-size: 11px; font-weight: 600; color: #334155; }
.county-panel { background: #fff; border-radius: 14px; border: 1px solid #E2E8F0; padding: 24px; }
.county-dropdown { position: relative; }

.county-menu { display: none; position: absolute; top: calc(100% + 4px); left: 0; z-index: 200; background: #fff; border: 1px solid #CBD5E1; border-radius: 8px; box-shadow: 0 4px 16px rgba(0,0,0,.14); min-width: 200px; max-height: 280px; overflow-y: auto; }

.county-opt { display: flex; align-items: center; gap: 8px; padding: 6px 12px; font-size: 13px; color: #334155; cursor: pointer; }
.county-opt:hover { background: #F1F5F9; }
.county-opt input[type=checkbox] { accent-color: #3B82F6; width: 14px; height: 14px; cursor: pointer; flex-shrink: 0; }
.note { margin-top: 12px; padding: 14px 18px; background: #FFFBEB; border-radius: 10px; border: 1px solid #FDE68A; font-size: 12px; color: #92400E; }
details { margin-top: 20px; background: #fff; border-radius: 14px; border: 1px solid #E2E8F0; overflow: hidden; }

const gradeMap = { Ki: "Kindergarten", S7: "7th Grade", K12: "K-12" };
const levelMap = { EL: "Elementary", MS: "Middle School", HS: "High School", K8: "K-8 / Full K-12" };
const ALL_DATA = RAW.rows.map(r => ({
  name: RAW.names[r[0]], district: RAW.districts[r[1]], county: RAW.counties[r[2]],
  city: r[3] >= 0 ? RAW.cities[r[3]] : "", type: r[4],
  grade: gradeMap[r[5]] || r[5], enrollment: r[6], completePct: r[7],
  completeCount: r[8], exempt: r[9], conditional: r[10], outOfCompliance: r[11],

}));

const PAGE_SIZE = 25;

let countyMenuOpen = false;
let state = { counties: [], grade: "All", schoolType: "All", schoolLevel: "All", sortBy: "risk", search: "", view: "table", page: 0 };

function risk(pct) {
  if (pct >= 95) return ["Low Risk","badge-low"];
  if (pct >= 90) return ["Moderate","badge-mod"];
  if (pct >= 80) return ["High Risk","badge-high"];
  return ["Critical","badge-crit"];
}
function levelClass(l) {
  if (l==="Elementary") return "level-el";
  if (l==="Middle School") return "level-ms";
  if (l==="High School") return "level-hs";
  return "level-k8";
}
function pctColor(p) {
  if (p<80) return "#DC2626"; if (p<90) return "#D97706"; if (p<95) return "#92400E"; return "#059669";
}

function getFiltered() {
  let d = ALL_DATA;
  if (state.counties.length > 0) d = d.filter(s => state.counties.includes(s.county));
  if (state.grade !== "All") d = d.filter(s => s.grade === state.grade);
  if (state.schoolType !== "All") d = d.filter(s => s.type === state.schoolType);
  if (state.schoolLevel !== "All") d = d.filter(s => s.level === state.schoolLevel);
  if (state.search) { const q = state.search.toLowerCase(); d = d.filter(s => s.name.toLowerCase().includes(q) || s.district.toLowerCase().includes(q) || s.city.toLowerCase().includes(q)); }
  const sorted = [...d];
  if (state.sortBy === "risk") sorted.sort((a,b) => a.completePct - b.completePct);
  else if (state.sortBy === "enrollment") sorted.sort((a,b) => b.enrollment - a.enrollment);
  else if (state.sortBy === "exempt") sorted.sort((a,b) => (b.exempt/(b.enrollment||1)) - (a.exempt/(a.enrollment||1)));
  else if (state.sortBy === "name") sorted.sort((a,b) => a.name.localeCompare(b.name));
  return sorted;
}

function render() {
  const filtered = getFiltered();
  const avg = filtered.length ? filtered.reduce((s,r) => s + r.completePct, 0) / filtered.length : 0;
  const below95 = filtered.filter(r => r.completePct < 95).length;
  const below90 = filtered.filter(r => r.completePct < 90).length;
  const totalStudents = filtered.reduce((s,r) => s + r.enrollment, 0);
  const totalExempt = filtered.reduce((s,r) => s + r.exempt, 0);
  const paged = filtered.slice(state.page * PAGE_SIZE, (state.page + 1) * PAGE_SIZE);

  let h = `<div style="display:flex;align-items:center;gap:10px;margin-bottom:4px"><span style="font-size:28px">&#x1f6e1;&#xfe0f;</span><h1>WA Measles Vaccination Dashboard</h1></div>
<p class="subtitle">2024\u201325 School Year \u00b7 Identify high-risk schools with low measles immunization rates</p>
<div class="filters">

<div class="county-menu${countyMenuOpen?" open":""}"><div class="county-menu-header"><button onclick="selectAllCounties()">Select All</button><button onclick="clearCountyFilter()">Clear</button></div>${COUNTIES.map(c=>`<label class="county-opt"><input type="checkbox"${state.counties.includes(c)?" checked":""} onchange="toggleCounty('${c}')"><span>${c}</span></label>`).join("")}</div>

</select>

<option value="PUBLIC"${state.schoolType==="PUBLIC"?" selected":""}>Public</option>
<option value="PRIVATE"${state.schoolType==="PRIVATE"?" selected":""}>Private</option>
</select>
<select onchange="setState({schoolLevel:this.value,page:0})">
<option value="All"${state.schoolLevel==="All"?" selected":""}>All School Levels</option>
<option value="Elementary"${state.schoolLevel==="Elementary"?" selected":""}>Elementary</option>
<option value="Middle School"${state.schoolLevel==="Middle School"?" selected":""}>Middle School</option>
<option value="High School"${state.schoolLevel==="High School"?" selected":""}>High School</option>
<option value="K-8 / Full K-12"${state.schoolLevel==="K-8 / Full K-12"?" selected":""}>K-8 / Full K-12</option>
</select>
<select onchange="setState({sortBy:this.value,page:0})">
<option value="risk"${state.sortBy==="risk"?" selected":""}>Highest Risk First</option>
<option value="enrollment"${state.sortBy==="enrollment"?" selected":""}>Largest Enrollment</option>
<option value="exempt"${state.sortBy==="exempt"?" selected":""}>Most Exemptions</option>
<option value="name"${state.sortBy==="name"?" selected":""}>Alphabetical</option>
</select>
</div>
<div class="stats">
<div class="stat-card"><div class="stat-label">Schools</div><div class="stat-value">${filtered.length.toLocaleString()}</div><div class="stat-sub">of ${ALL_DATA.length.toLocaleString()} total</div></div>
<div class="stat-card"><div class="stat-label">Avg Complete %</div><div class="stat-value" style="color:${pctColor(avg)}">${avg.toFixed(1)}%</div><div class="stat-sub">95% = herd immunity</div></div>
<div class="stat-card"><div class="stat-label">Below 95%</div><div class="stat-value" style="color:#D97706">${below95.toLocaleString()}</div><div class="stat-sub">${((below95/(filtered.length||1))*100).toFixed(0)}% of filtered</div></div>
<div class="stat-card"><div class="stat-label">Below 90%</div><div class="stat-value" style="color:#DC2626">${below90.toLocaleString()}</div><div class="stat-sub">High + Critical risk</div></div>
<div class="stat-card"><div class="stat-label">Total Exempt</div><div class="stat-value">${totalExempt.toLocaleString()}</div><div class="stat-sub">of ${totalStudents.toLocaleString()} students</div></div>
</div>
<div class="tabs">
<button class="tab ${state.view==="table"?"active":""}" onclick="setState({view:'table'})">&#x1f4cb; School List</button>
<button class="tab ${state.view==="county"?"active":""}" onclick="setState({view:'county'})">&#x1f4ca; By County</button>
</div>`;

  if (state.view === "table") {
    h += `<div class="table-wrap"><div style="overflow-x:auto"><table><thead><tr>
    <th>School</th><th>District</th><th>County</th><th>Level</th><th>Type</th><th>Grade</th><th>Enrolled</th><th>Complete %</th><th>Exempt</th><th>Out of Compliance</th><th>Risk</th>
    </tr></thead><tbody>`;
    for (const s of paged) {
      const [rl, rc] = risk(s.completePct);
      h += `<tr>
      <td class="truncate" style="font-weight:600;color:#0F172A">${s.name}</td>
      <td class="truncate-d" style="color:#475569">${s.district}</td>
      <td style="color:#475569">${s.county}</td>
      <td><span class="level-badge ${levelClass(s.level)}">${s.level}</span></td>
      <td><span class="${s.type==="PUBLIC"?"type-pub":"type-priv"}">${s.type}</span></td>
      <td style="color:#475569;font-size:12px">${s.grade}</td>
      <td style="font-weight:600;color:#334155;text-align:right">${s.enrollment}</td>
      <td style="font-weight:700;text-align:right;color:${pctColor(s.completePct)}">${s.completePct.toFixed(1)}%</td>

      <td><span class="badge ${rc}">${rl}</span></td>

    }
    h += `</tbody></table></div>`;
    if (totalPages > 1) {
      h += `<div class="pager"><span>Showing ${state.page*PAGE_SIZE+1}\u2013${Math.min((state.page+1)*PAGE_SIZE, filtered.length)} of ${filtered.length}</span><div style="display:flex;gap:6px">

    h += `</div>`;
  }

  if (state.view === "county") {
    const map = {};
    for (const s of filtered) {
      if (!map[s.county]) map[s.county] = {sumPct:0,count:0};
      map[s.county].sumPct += s.completePct; map[s.county].count++;
    }
    const bars = Object.entries(map).map(([n,v]) => ({label:n, value:v.sumPct/v.count})).sort((a,b) => a.value - b.value);
    h += `<div class="county-panel"><h3 style="font-size:16px;font-weight:700;color:#0F172A;margin-bottom:6px">Average Measles Completion Rate by County</h3>
    <p style="font-size:12px;color:#94A3B8;margin-bottom:20px">Sorted lowest \u2192 highest \u00b7 Red &lt; 90% \u00b7 Yellow 90\u201395% \u00b7 Green \u2265 95% \u00b7 Filters apply</p>`;
    for (const d of bars) {
      const col = d.value < 90 ? (d.value < 80 ? "#EF4444" : "#F59E0B") : "#10B981";
      h += `<div class="bar-row"><div class="bar-label">${d.label}</div><div class="bar-track"><div class="bar-fill" style="width:${d.value}%;background:${col}"></div><span class="bar-val">${d.value.toFixed(1)}%</span></div></div>`;

    h += `</div>`;

  h += `<details><summary>&#x1f4d6; Definitions & How to Read This Dashboard</summary><div class="defs">
<h4>Immunization Status Columns</h4>
<p><strong style="color:#059669">Complete %</strong> \u2014 Percentage of enrolled students who have received all required doses of MMR vaccine and have documentation on file. Washington state requires <strong>2 doses of MMR</strong> for all students in kindergarten through 12th grade (per WAC 246-105-030). A student with only 1 dose is not considered complete.</p>
<p><strong style="color:#475569">Enrolled</strong> \u2014 Total number of students reported at the school for the selected grade level.</p>
<p><strong style="color:#DC2626">Exempt</strong> \u2014 Students with a filed exemption excusing them from the MMR vaccine requirement. <strong>Important:</strong> In 2019, Washington State removed the personal/philosophical exemption specifically for MMR (signed into law by Gov. Inslee, effective July 28, 2019). Only <strong>medical</strong> and <strong>religious</strong> exemptions are allowed for measles. This law applies to all public and private schools.</p>
<p><strong style="color:#D97706">Conditional</strong> \u2014 Students who are in the process of completing their MMR vaccine series. For example, a kindergartner who received dose 1 but is waiting for the minimum interval before dose 2 can attend school in conditional status. They have 30 calendar days after the next dose comes due to provide documentation.</p>
<p><strong style="color:#D97706">Out of Compliance</strong> \u2014 Students who are neither fully vaccinated, conditionally enrolled, nor exempt. These students do not meet current immunization requirements and may be excluded from attendance per RCW 28A.210.120.</p>

<h4>School Level (Inferred)</h4>
<p>The source data does not include an explicit school level. The dashboard infers it based on which grade-level checkpoints each school reports:</p>
<p><span class="level-badge level-el">Elementary</span> \u2014 School reports Kindergarten data but no 7th Grade data. Typically serves grades K\u20135 or K\u20136.</p>
<p><span class="level-badge level-ms">Middle School</span> \u2014 School reports 7th Grade data but no Kindergarten data. Typically serves grades 6\u20138 or 7\u20138.</p>
<p><span class="level-badge level-hs">High School</span> \u2014 School reports neither Kindergarten nor 7th Grade data (K-12 total only). Includes high schools, alternative programs, and other schools without those checkpoint grades.</p>
<p><span class="level-badge level-k8">K-8 / Full K-12</span> \u2014 School reports both Kindergarten and 7th Grade data. Serves a wide grade range spanning both checkpoints.</p>

<h4>Risk Levels</h4>
<p><span class="badge badge-low">Low Risk</span> <strong>(\u2265 95%)</strong> \u2014 Meets or exceeds the 95% threshold generally considered necessary for herd immunity against measles.</p>
<p><span class="badge badge-mod">Moderate</span> <strong>(90\u201394.9%)</strong> \u2014 Below herd immunity threshold. Some vulnerability to outbreaks if measles is introduced.</p>
<p><span class="badge badge-high">High Risk</span> <strong>(80\u201389.9%)</strong> \u2014 Significant gap in coverage. Elevated risk of sustained transmission during an outbreak.</p>
<p><span class="badge badge-crit">Critical</span> <strong>(&lt; 80%)</strong> \u2014 Substantially under-vaccinated. Very high risk of rapid spread if measles is introduced.</p>

<h4>Grade Levels</h4>
<p><strong>Kindergarten</strong> \u2014 Immunization data for students entering kindergarten. WA requires 2 doses of MMR by kindergarten entry (age \u22654 on Sept 1). This is a key checkpoint \u2014 children must have both doses before starting school or enter in conditional status.</p>
<p><strong>7th Grade</strong> \u2014 Immunization data for students entering 7th grade. The same 2-dose MMR requirement applies. Students missing dose 2 from earlier grades should be caught at this checkpoint.</p>
<p><strong>K-12 (School-Wide Total)</strong> \u2014 The total immunization count across <em>every student at the school</em>, all grades combined. This is not just kindergarten + 7th grade added together \u2014 it includes all the grades in between (1st\u20136th, 8th\u201312th) that don\u2019t have their own separate reporting checkpoint. Every school reports this number.</p>
<p><strong>"All Records" filter</strong> \u2014 When the grade dropdown is set to "All Records," the dashboard shows kindergarten, 7th grade, and K-12 rows together. A single school may appear multiple times \u2014 once per grade level it reported.</p>

<h4>About the 95% Threshold & WA State Law</h4>
<p>Measles is one of the most contagious diseases known. Public health authorities generally estimate that approximately 95% of a population needs to be immune to prevent sustained transmission (herd immunity). Schools falling below this threshold are at greater risk during an outbreak, with risk increasing as the rate drops further.</p>
<p>Washington is one of the stricter states regarding MMR exemptions. Since July 2019, personal and philosophical exemptions are <strong>not permitted</strong> for MMR \u2014 only medical and religious exemptions are accepted (RCW 28A.210.090). Students without documentation of 2 MMR doses and no valid exemption can be excluded from school (RCW 28A.210.120). During an outbreak, even students with valid exemptions may be excluded for the duration of the outbreak.</p>

function toggleCounty(county) {
  const next = state.counties.includes(county)
    ? state.counties.filter(c => c !== county)
    : [...state.counties, county];
  countyMenuOpen = true;
  setState({counties: next, page: 0});
}

function selectAllCounties() {
  countyMenuOpen = true;
  setState({counties: COUNTIES.slice(), page: 0});
}

function clearCountyFilter() {
  countyMenuOpen = true;
  setState({counties: [], page: 0});
}
